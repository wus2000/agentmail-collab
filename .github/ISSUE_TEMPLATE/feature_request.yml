name: Feature request
description: Suggest an improvement for AgentMail Collab.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should AgentMail do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP tools
        - Claude Code plugin
        - Codex plugin
        - Codex bridge
        - Documentation
        - Packaging/release
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or design alternative you considered.
