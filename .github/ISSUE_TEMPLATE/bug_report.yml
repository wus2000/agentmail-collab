name: Bug report
description: Report something that is broken in AgentMail Collab.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid including secrets or private agent messages.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Commands or TUI steps that reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.5, Ubuntu 24.04, WSL2, ..."
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python --version"
  - type: input
    id: claude
    attributes:
      label: Claude Code version
      placeholder: "claude --version"
  - type: input
    id: codex
    attributes:
      label: Codex version
      placeholder: "codex --version"
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant output from `agentmail doctor`, `agentmail status`, or logs. Redact private content.
      render: shell
